name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      APP_ORIGIN: http://127.0.0.1:3000
      CLIO_BASE_URL: https://app.clio.com
      CLIO_CLIENT_ID: ci-placeholder
      CLIO_CLIENT_SECRET: ci-placeholder
      CLIO_REDIRECT_URI: http://127.0.0.1:3000/api/auth/clio/callback
      TOKEN_ENCRYPTION_KEY: ci-placeholder-token-encryption-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
